<!DOCTYPE html>
<html>
<head>
    <title>MovieAI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #121212;
            color: white;
        }

        .navbar {
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
        }

        .brand {
            color: #e50914 !important;
            font-weight: bold;
        }

        .container {
            margin-top: 30px;
        }
        .movie-card:hover {
    transform: scale(1.07);
    transition: 0.3s ease;
}
.btn-danger:hover {
    box-shadow: 0 0 10px #e50914;
    transform: translateY(-2px);
}
<style>

/* GRID CLEAN LOOK */
.netflix-card {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    transition: 0.3s ease;
    cursor: pointer;
}

/* POSTER */
.netflix-poster {
    width: 100%;
    height: 260px;
    object-fit: cover;
    border-radius: 10px;
}

/* HOVER EFFECT */
.netflix-card:hover {
    transform: scale(1.08);
    z-index: 10;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

/* DARK OVERLAY */
.overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    color: white;
    padding: 10px;
    font-size: 13px;
    opacity: 0;
    transition: 0.3s;
}

.netflix-card:hover .overlay {
    opacity: 1;
}

/* PAGE TITLE */
h2 {
    color: white;
    letter-spacing: 1px;
}

/* EMPTY STATE */
.empty-state {
    padding: 60px;
    background: #1a1a1a;
    border-radius: 12px;
    border: 1px solid #2a2a2a;
    color: white;
}
<style>

/* container */
.netflix-card {
    position: relative;
    overflow: hidden;
}

/* trailer hidden by default */
.trailer-popup {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    opacity: 0;
    transform: scale(0.95);
    transition: 0.3s;
    z-index: 5;
}

/* show trailer on hover */
.netflix-card:hover .trailer-popup {
    opacity: 1;
    transform: scale(1);
}

/* hide poster slightly when trailer shows */
.netflix-card:hover .netflix-poster {
    opacity: 0.2;
}

/* PAGE TITLE */
.page-title {
    color: #fff;
    font-weight: 600;
    margin-bottom: 20px;
}

/* TILE */
.movie-tile {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    height: 230px;
    transition: 0.3s;
}

/* POSTER */
.poster {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

/* HOVER EFFECT */
.movie-tile:hover {
    transform: scale(1.06);
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

/* OVERLAY */
.overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 10px;

    background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
    color: white;

    opacity: 0;
    transition: 0.3s;
}

.movie-tile:hover .overlay {
    opacity: 1;
}

/* TITLE */
.title {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
}

/* BUTTONS */
.actions .btn {
    width: 100%;
    font-size: 12px;
    padding: 4px;
}

/* EMPTY STATE */
.empty-box {
    background: #1a1a1a;
    padding: 50px;
    border-radius: 12px;
    color: white;
    border: 1px solid #2a2a2a;
}


/* Center wrapper for both login & register */
.auth-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 85vh;
    background: #f4f4f4;
}

/* Shared card design */
.auth-card {
    background: #ffffff;
    padding: 40px;
    border-radius: 14px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
}

/* Title */
.auth-card h3 {
    text-align: center;
    margin-bottom: 25px;
    font-weight: 600;
    color: #111;
}

/* Input group */
.form-group {
    position: relative;
    margin-bottom: 20px;
}

/* Inputs */
.form-group input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
}

/* Floating label */
.form-group label {
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
    background: white;
    padding: 0 5px;
    color: #777;
    transition: 0.3s;
}

/* Float effect */
.form-group input:focus + label,
.form-group input:valid + label {
    top: -8px;
    font-size: 12px;
    color: #e50914;
}

/* Button */
.btn-danger {
    border-radius: 8px;
    font-weight: 500;
}

/* Link text */
.auth-footer {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
}

.auth-footer a {
    color: #e50914;
    text-decoration: none;
}


    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg px-4">

    <a class="navbar-brand brand" href="/">🎬 MovieAI</a>

    <div class="ms-auto d-flex gap-2">

        <!-- Home -->
        <a href="/" class="btn btn-sm btn-outline-light">
            Home
        </a>

        <!-- Trending -->
        <a href="/trending/" class="btn btn-sm btn-outline-light">
            🔥 Trending
        </a>

        {% if user.is_authenticated %}
        <!-- My Picks -->
        <a href="/user-recommend/" class="btn btn-sm btn-outline-light">
            🎯 My Picks
        </a>

        <!-- Watchlist -->
        <a href="/watchlist/" class="btn btn-sm btn-outline-light">
            ❤️ Watchlist
        </a>

        <!-- Logout -->
        <a href="/logout/" class="btn btn-sm btn-danger">
            Logout
        </a>
        {% else %}
        <!-- Login -->
        <a href="/login/" class="btn btn-sm btn-outline-light">
            Login
        </a>

        <!-- Signup -->
        <a href="/signup/" class="btn btn-sm btn-danger">
            Sign Up
        </a>
        {% endif %}

    </div>

</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
